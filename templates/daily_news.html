<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>

body{
    font-family:'Malgun Gothic',sans-serif;
    font-size:16px;
    line-height:1.8;
    margin:30px;
}

.title{
    font-size:28px;
    font-weight:bold;
    border-bottom:2px solid #333;
    padding-bottom:10px;
    margin-bottom:20px;
}

.section{
    font-size:20px;
    font-weight:bold;
    margin-top:25px;
    margin-bottom:10px;
}

.article{
    margin-bottom:15px;
}

.article-title{
    font-weight:bold;
}

.article-meta{
    color:#666;
}

a{
    color:#0066cc;
    text-decoration:none;
    font-weight:bold;
}

a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="title">
{{ report_date }} 가상자산 법인 시장 동향
</div>

{% for article in articles %}

<div class="article">

<div class="article-title">
▲ {{ article.title }}
<span class="article-meta">
({{ article.source }} {{ article.date }})
</span>
</div>

<div>
<a
    href="{{ article.link }}"
    target="_blank"
>
본문 보러가기
</a>
</div>

</div>

{% endfor %}

</body>
</html>
