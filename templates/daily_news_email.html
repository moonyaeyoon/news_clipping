<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>법인 디지털자산 시장 동향</title>
<link href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT@2/fonts/static/woff2/SUIT.css" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/ungveloper/web-fonts/SCoreDream/font-face.css" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/ungveloper/web-fonts/SCoreDream/font-family.css" />
<style type="text/css">
body, table, td, a {
    font-family:'SUIT','Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif;
}
@font-face {
    font-family:'EstablishRetrosans';
    src:local('EstablishRetrosans');
    font-weight:normal;
    font-style:normal;
}
</style>
</head>
<body bgcolor="#ffffff" style="margin:0; padding:0; background-color:#ffffff;">

<table
    id="bodyTable"
    border="0"
    cellpadding="0"
    cellspacing="0"
    width="100%"
    bgcolor="#ffffff"
    style="border-collapse:collapse; width:100%; background-color:#ffffff; margin:0; padding:0;"
>
<tr>
<td align="center" valign="top" bgcolor="#ffffff">

<table
    border="0"
    cellpadding="0"
    cellspacing="0"
    width="680"
    bgcolor="#ffffff"
    style="border-collapse:collapse; width:680px; background-color:#ffffff;"
>
<tr>
<td
    align="right"
    valign="bottom"
    width="680"
    height="100"
    bgcolor="#ffffff"
    background="{{ header_image_url }}"
    style="width:680px; height:100px; background-color:#ffffff; background-image:url('{{ header_image_url }}'); background-repeat:no-repeat; background-position:center top; background-size:680px 102px;"
>
<table
    border="0"
    cellpadding="0"
    cellspacing="0"
    width="680"
    height="100"
    style="border-collapse:collapse; width:680px; height:100px;"
>
<tr>
<td
    align="right"
    valign="bottom"
    width="680"
    height="100"
    style="width:680px; height:100px; padding-top:0; padding-right:16px; padding-bottom:9px; padding-left:0;"
>
<font
    face="S-Core Dream, SUIT, Apple SD Gothic Neo, Malgun Gothic, Arial, sans-serif"
    color="#ffffff"
    style="font-family:'S-Core Dream','SUIT','Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif; font-size:18px; font-weight:500; line-height:22px; color:#ffffff; letter-spacing:0; text-shadow:0 1px 2px rgba(0,0,0,0.28);"
>
{{ report_date }}
</font>
</td>
</tr>
</table>
</td>
</tr>

<tr>
<td
    align="center"
    valign="top"
    bgcolor="#ffffff"
    style="background-color:#ffffff; padding-top:28px; padding-right:0; padding-bottom:34px; padding-left:0;"
>
<table
    border="0"
    cellpadding="0"
    cellspacing="0"
    width="520"
    style="border-collapse:collapse; width:520px;"
>
{% for article in articles %}
<tr>
<td
    align="left"
    valign="top"
    style="border-bottom:1px solid #d8d8d8; padding-top:13px; padding-right:0; padding-bottom:13px; padding-left:0;"
>
<table
    border="0"
    cellpadding="0"
    cellspacing="0"
    width="520"
    style="border-collapse:collapse; width:520px;"
>
<tr>
<td
    align="left"
    valign="middle"
    style="padding-top:0; padding-right:0; padding-bottom:5px; padding-left:0;"
>
<font
    face="SUIT, Apple SD Gothic Neo, Malgun Gothic, Arial, sans-serif"
    color="#777777"
    style="font-family:'SUIT','Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif; font-size:12px; font-weight:400; line-height:18px; color:#777777;"
>
{{ article.source }}&nbsp;&nbsp;{{ article.date }}
</font>
</td>
</tr>
<tr>
<td
    align="left"
    valign="middle"
    style="padding-top:0; padding-right:0; padding-bottom:0; padding-left:0;"
>
<a
    href="{{ article.link }}"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="기사 원문 열기"
    style="color:#252525; font-family:'SUIT',sans-serif; font-size:18px; font-weight:500; line-height:26px; text-decoration:none;"
><font color="#252525">{{ article.title }}</font></a>
</td>
</tr>
</table>
</td>
</tr>
{% endfor %}

<tr>
<td
    align="center"
    valign="middle"
    style="padding-top:30px; padding-right:0; padding-bottom:0; padding-left:0;"
>
<a
    href="{{ bithumb_biz_url }}"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="빗썸 BIZ 바로가기"
    style="text-decoration:none;"
><img
    src="{{ biz_button_image_url }}"
    alt="빗썸 BIZ 바로가기"
    width="110"
    height="38"
    style="border:0; outline:none; text-decoration:none; display:block; width:110px; height:38px;"
/></a>
</td>
</tr>
</table>
</td>
</tr>

<tr>
<td
    align="center"
    valign="top"
    bgcolor="#eaf6ff"
    style="background-color:#eaf6ff; padding-top:0; padding-right:0; padding-bottom:0; padding-left:0;"
>
<img
    src="{{ footer_image_url }}"
    alt="빗썸 BIZ 안내 푸터"
    width="680"
    height="93"
    style="border:0; outline:none; text-decoration:none; display:block; width:680px; height:93px;"
/>
</td>
</tr>
</table>

</td>
</tr>
</table>

</body>
</html>
