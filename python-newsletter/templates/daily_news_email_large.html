<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>법인 디지털자산 시장 동향</title>
<link href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT@2/fonts/static/woff2/SUIT.css" rel="stylesheet" />
<style type="text/css">
body, table, td, a {
    font-family:'SUIT',sans-serif;
}
</style>
</head>
<body bgcolor="#ffffff" style="margin:0; padding:0; background-color:#ffffff;">

<table
    id="bodyTable"
    border="0"
    cellpadding="0"
    cellspacing="0"
    width="100%"
    bgcolor="#ffffff"
    style="border-collapse:collapse; width:100%; background-color:#ffffff; margin:0; padding:0;"
>
<tr>
<td align="center" valign="top" bgcolor="#ffffff">

<table
    border="0"
    cellpadding="0"
    cellspacing="0"
    width="860"
    bgcolor="#ffffff"
    style="border-collapse:collapse; width:860px; background-color:#ffffff;"
>
<tr>
<td
    align="right"
    valign="bottom"
    width="860"
    height="127"
    bgcolor="#ffffff"
    background="{{ header_image_url }}"
    style="width:860px; height:127px; background-color:#ffffff; background-image:url('{{ header_image_url }}'); background-repeat:no-repeat; background-position:center top; background-size:860px 129px;"
>
<table
    border="0"
    cellpadding="0"
    cellspacing="0"
    width="860"
    height="127"
    style="border-collapse:collapse; width:860px; height:127px;"
>
<tr>
<td
    align="right"
    valign="top"
    width="860"
    height="96"
    style="width:860px; height:96px; font-size:0; line-height:0;"
>&nbsp;</td>
</tr>
<tr>
<td
    align="right"
    valign="middle"
    width="860"
    height="21"
    style="width:860px; height:21px; padding-top:0; padding-right:20px; padding-bottom:0; padding-left:0;"
>
<font
    face="SUIT, sans-serif"
    color="#ffffff"
    style="font-family:'SUIT',sans-serif; font-size:15px; font-weight:600; line-height:17px; color:#ffffff; letter-spacing:0; text-shadow:0 1px 2px rgba(0,0,0,0.28);"
>
{{ report_date }}
</font>
</td>
</tr>
<tr>
<td
    align="right"
    valign="top"
    width="860"
    height="10"
    style="width:860px; height:10px; font-size:0; line-height:0;"
>&nbsp;</td>
</tr>
</table>
</td>
</tr>

<tr>
<td
    align="center"
    valign="top"
    bgcolor="#ffffff"
    style="background-color:#ffffff; padding-top:35px; padding-right:0; padding-bottom:43px; padding-left:0;"
>
<table
    border="0"
    cellpadding="0"
    cellspacing="0"
    width="720"
    style="border-collapse:collapse; width:720px;"
>
{% for article in articles %}
<tr>
<td
    align="left"
    valign="top"
    style="border-bottom:1px solid #d8d8d8; padding-top:17px; padding-right:0; padding-bottom:17px; padding-left:0;"
>
<table
    border="0"
    cellpadding="0"
    cellspacing="0"
    width="720"
    style="border-collapse:collapse; width:720px;"
>
<tr>
<td
    align="left"
    valign="middle"
    style="padding-top:0; padding-right:0; padding-bottom:5px; padding-left:0;"
>
<font
    face="SUIT, sans-serif"
    color="#777777"
    style="font-family:'SUIT',sans-serif; font-size:14px; font-weight:400; line-height:21px; color:#777777;"
>
{{ article.source }}&nbsp;&nbsp;{{ article.date }}
</font>
</td>
</tr>
<tr>
<td
    align="left"
    valign="middle"
    style="padding-top:0; padding-right:0; padding-bottom:0; padding-left:0;"
>
<a
    href="{{ article.link }}"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="기사 원문 열기"
    style="color:#252525; font-family:'SUIT',sans-serif; font-size:20px; font-weight:500; line-height:30px; text-decoration:none;"
><font color="#252525">{{ article.title }}</font></a>
</td>
</tr>
</table>
</td>
</tr>
{% endfor %}

<tr>
<td
    align="center"
    valign="middle"
    style="padding-top:38px; padding-right:0; padding-bottom:0; padding-left:0;"
>
<a
    href="{{ bithumb_biz_url }}"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="빗썸 BIZ 바로가기"
    style="text-decoration:none;"
><img
    src="{{ biz_button_image_url }}"
    alt="빗썸 BIZ 바로가기"
    width="139"
    height="48"
    style="border:0; outline:none; text-decoration:none; display:block; width:139px; height:48px;"
/></a>
</td>
</tr>
</table>
</td>
</tr>

<tr>
<td
    align="left"
    valign="top"
    bgcolor="#eaf6ff"
    background="{{ footer_image_url }}"
    width="860"
    height="98"
    style="width:860px; height:98px; background-color:#eaf6ff; background-image:url('{{ footer_image_url }}'); background-repeat:no-repeat; background-position:center top; background-size:860px 98px; padding-top:0; padding-right:0; padding-bottom:0; padding-left:0;"
>
<table
    border="0"
    cellpadding="0"
    cellspacing="0"
    width="860"
    height="98"
    style="border-collapse:collapse; width:860px; height:98px;"
>
<tr>
<td
    align="left"
    valign="top"
    width="619"
    style="width:619px; padding-top:56px; padding-right:0; padding-bottom:0; padding-left:109px;"
>
<table
    border="0"
    cellpadding="0"
    cellspacing="0"
    style="border-collapse:collapse;"
>
<tr>
<td
    align="left"
    valign="top"
    style="padding-top:0; padding-right:0; padding-bottom:0; padding-left:0; font-family:'SUIT',sans-serif; font-size:10px; font-weight:400; line-height:12px; color:#7c7c7c;"
>
<font
    face="SUIT, sans-serif"
    color="#7c7c7c"
    style="font-family:'SUIT',sans-serif; font-size:10px; font-weight:400; line-height:12px; color:#7c7c7c;"
>
📞 문의하기: 1661-5566 (2번, 법인 전용 상담 창구)
</font>
</td>
</tr>
<tr>
<td
    align="left"
    valign="top"
    style="padding-top:1px; padding-right:0; padding-bottom:0; padding-left:0; font-family:'SUIT',sans-serif; font-size:10px; font-weight:400; line-height:12px; color:#7c7c7c;"
>
<font
    face="SUIT, sans-serif"
    color="#7c7c7c"
    style="font-family:'SUIT',sans-serif; font-size:10px; font-weight:400; line-height:12px; color:#7c7c7c;"
>
📧 이메일: biz@bithumbcorp.com
</font>
</td>
</tr>
</table>
</td>
</tr>
</table>
</td>
</tr>
</table>

</td>
</tr>
</table>

</body>
</html>
